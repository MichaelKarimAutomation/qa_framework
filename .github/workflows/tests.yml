name: QA Framework Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment to run against'
        required: true
        default: 'dev_env'
        type: choice
        options:
          - uat_env
          - dev_env

jobs:
  example_test:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || 'dev_env' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run tests
        env:
          TODOMVC_URL: ${{ secrets.TODOMVC_URL }}
          JSONPLACEHOLDER_URL: ${{ secrets.JSONPLACEHOLDER_URL }}
        run: uv run pytest tests/ -v --env=${{ inputs.env || 'dev_env' }}

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: reports/allure-results
          